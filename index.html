<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARTIST NAME — Track Title</title>
<link href="https://fonts.googleapis.com/css2?family=Radio+Canada:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Radio Canada', sans-serif;
    background: #0a0a0a;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-x: hidden;
  }

  /* Animated background blobs */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    animation: drift linear infinite;
  }

  .blob:nth-child(1) {
    width: 500px; height: 500px;
    background: #7b2fff;
    top: -150px; left: -100px;
    animation-duration: 8s;
  }
  .blob:nth-child(2) {
    width: 400px; height: 400px;
    background: #00c2ff;
    bottom: -120px; right: -80px;
    animation-duration: 10s;
    animation-direction: reverse;
  }
  .blob:nth-child(3) {
    width: 300px; height: 300px;
    background: #ff5500;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 6s;
  }

  @keyframes drift {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(40px, 30px) scale(1.05); }
    50%  { transform: translate(20px, 60px) scale(0.95); }
    75%  { transform: translate(-30px, 20px) scale(1.03); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,255,255,0.35);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(-10vh) translateX(var(--dx)); opacity: 0; }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .card { position: relative; z-index: 1; }

  .card {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .artwork {
    width: 100%;
    aspect-ratio: 1 / 1;
    border-radius: 16px;
    overflow: hidden;
    background: #1a1a1a;
    border: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #333;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .artwork img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .meta {
    margin-top: 1.5rem;
    text-align: center;
    width: 100%;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .meta .label {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #FF8C00;
    margin-bottom: 0.6rem;
    animation: blink 1.5s ease-in-out infinite;
    border: 1px solid #FF8C00;
    border-radius: 4px;
    padding: 3px 10px;
  }

  .meta .title {
    font-size: 22px;
    font-weight: 600;
    color: #f5f5f5;
    line-height: 1.2;
    letter-spacing: -0.01em;
  }

  .meta .artist {
    font-size: 13px;
    font-weight: 400;
    color: #777;
    margin-top: 0.3rem;
    letter-spacing: 0.04em;
  }

  .release-info {
    margin-top: 1.5rem;
    width: 100%;
    text-align: center;
  }

  .release-date {
    font-size: 12px;
    font-weight: 400;
    color: #888;
    letter-spacing: 0.05em;
    margin-bottom: 1rem;
  }

  .release-date span {
    color: #f5f5f5;
    font-weight: 500;
  }

  .countdown {
    display: flex;
    justify-content: center;
    align-items: baseline;
    gap: 1rem;
    width: 100%;
  }

  .countdown-item {
    text-align: center;
  }

  .countdown-value {
    font-size: 33px;
    font-weight: 600;
    color: #f5f5f5;
    line-height: 1;
    display: block;
  }

  .countdown-label {
    font-size: 11px;
    color: #666;
    margin-top: 0.25rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
  }

  .countdown-separator {
    font-size: 33px;
    color: #333;
    font-weight: 300;
  }

  .divider {
    width: 100%;
    height: 1px;
    background: #1e1e1e;
    margin: 1.5rem 0;
  }

  .platforms {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 16px 18px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: #e8e8e8;
    text-decoration: none;
    font-family: 'Radio Canada', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .btn:hover {
    background: rgba(255, 255, 255, 0.09);
    border-color: rgba(255, 255, 255, 0.18);
  }

  .btn:active {
    transform: scale(0.985);
  }

  .btn .icon-wrap {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .btn .name {
    flex: 1;
  }

  .btn .badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 4px;
    background: #1e1e1e;
    color: #555;
    border: 1px solid #252525;
  }

  .btn .arrow {
    font-size: 20px;
    color: #444;
    transition: color 0.15s;
  }

  .btn:hover .arrow { color: #666; }

  .btn.spotify      .icon-wrap { background: #0f2a18; }
  .btn.apple        .icon-wrap { background: #2a0f10; }
  .btn.amazon       .icon-wrap { background: #081c26; }
  .btn.tidal        .icon-wrap { background: #1e1e1e; }
  .btn.deezer       .icon-wrap { background: #1c0f2a; }
  .btn.soundcloud   .icon-wrap { background: #2a1500; }
  .btn.beatport     .icon-wrap { background: #0a1f17; }
  .btn.youtubemusic .icon-wrap { background: #2a0a0a; }

  .footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: #333;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="bg">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="grid-overlay"></div>

<div class="particles" id="particles"></div>

  <div class="artwork">

</body>
<script>
  const container = document.getElementById('particles');
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2.5 + 1;
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      width: ${size}px;
      height: ${size}px;
      --dx: ${(Math.random() - 0.5) * 120}px;
      animation-duration: ${Math.random() * 15 + 10}s;
      animation-delay: ${Math.random() * 15}s;
      opacity: 0;
    `;
    container.appendChild(p);
  }

  // COUNTDOWN SETTINGS - Change this date for your release
  const releaseDate = new Date('2026-10-04T00:00:00').getTime();
  
  // Format and display release date
  const releaseDateEl = document.getElementById('releaseDate');
  const dateOptions = { 
    year: 'numeric', 
    month: 'long', 
    day: 'numeric'
  };
  releaseDateEl.textContent = new Date(releaseDate).toLocaleDateString('en-US', dateOptions);

  // Countdown function
  function updateCountdown() {
    const now = new Date().getTime();
    const distance = releaseDate - now;

    if (distance < 0) {
      document.getElementById('days').textContent = '00';
      document.getElementById('hours').textContent = '00';
      document.getElementById('minutes').textContent = '00';
      document.getElementById('seconds').textContent = '00';
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById('days').textContent = String(days).padStart(2, '0');
    document.getElementById('hours').textContent = String(hours).padStart(2, '0');
    document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
    document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
  }

  // Update countdown every second
  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
